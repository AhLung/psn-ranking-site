<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="PSN Rank public frontend dashboard for PlayStation trophy tracking and platinum leaderboard views."
  />
  <title>PSN Rank Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">PS</span>
        <div class="brand-copy">
          <p>PSN Rank</p>
          <small>Public Frontend</small>
        </div>
      </div>

      <nav class="nav-links" aria-label="Dashboard sections">
        <a href="#top-three">Top 3</a>
        <a href="#leaderboard">Leaderboard</a>
        <a href="#future">Future Blocks</a>
      </nav>
    </header>

    <main id="app" class="content" aria-live="polite">
      <section class="section-shell">
        <p class="eyebrow">Loading</p>
        <h2>Preparing dashboard data...</h2>
        <p class="section-note">Reading <code>data/players.json</code> and validating content.</p>
      </section>
    </main>

    <footer class="site-footer">
      <p>Public site repo. Reads sanitized local JSON only.</p>
    </footer>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
